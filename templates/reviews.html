<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отзывы - Что приготовим?</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 40px 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .nav-link { text-align: center; margin-bottom: 20px; }
        .nav-link a { color: white; text-decoration: none; font-weight: bold; }

        h1 { text-align: center; color: #2d3436; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #6c63ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .error { color: #e74c3c; background: #fdf2f2; padding: 10px; border-radius: 8px; margin-top: 10px; }

        .review-card {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 12px;
            border-left: 5px solid #6c63ff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .review-header { display: flex; justify-content: space-between; color: #636e72; font-size: 0.85em; }
        .review-name { font-weight: bold; color: #2d3436; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="nav-link" style="margin-top: 20px;">
        <a href="/">← Вернуться к поиску рецептов</a>
    </div>

    <div class="container">
        <h1>💬 Отзывы</h1>

        <form method="post">
            <input type="text" name="name" placeholder="Ваше имя">
            <textarea name="text" rows="4" placeholder="Напишите ваш отзыв..." required></textarea>
            
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <button type="submit">Опубликовать</button>
        </form>

        <div style="margin-top: 40px;">
            {% for review in reviews %}
                <div class="review-card">
                    <div class="review-header">
                        <span class="review-name">{{ review.name }}</span>
                        <span>{{ review.date }}</span>
                    </div>
                    <p style="margin-top: 10px; line-height: 1.4; color: #444;">{{ review.text }}</p>
                </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
